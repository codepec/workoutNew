<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Iron Insanity — Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#00FF66">

<link rel="apple-touch-icon" href="../icons/icon-192x192.png">
<link rel="icon" href="../favicon.ico" type="image/png">
<link rel="stylesheet" href="../styles/app.css">

<style>
/* =========================
   SETTING ROW
========================= */
.setting {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid var(--border);
}

.setting:last-child {
  border-bottom:none;
}

.setting-label {
  font-weight:600;
  opacity:.95;
}

/* SWITCH */
.switch {
  position:relative;
  width:52px;
  height:28px;
}

.switch input {
  display:none;
}

.slider {
  position:absolute;
  inset:0;
  background:#374151;
  border-radius:999px;
  cursor:pointer;
  transition:.25s;
}

.slider:before {
  content:"";
  position:absolute;
  height:22px;
  width:22px;
  left:3px;
  top:3px;
  background:white;
  border-radius:50%;
  transition:.25s;
}

input:checked + .slider {
  background:var(--accent);
}

input:checked + .slider:before {
  transform:translateX(24px);
}

/* BUTTONS */
.action-btn {
  width:100%;
  margin-top:14px;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:700;
  cursor:pointer;
  background:#374151;
  color:white;
}

.action-btn.danger {
  background:#7f1d1d;
}

.action-btn:hover {
  transform:translateY(-2px);
}
</style>
</head>

<body>

<script>
/* =========================
   LOAD THEME EARLY
========================= */
const savedTheme = localStorage.getItem("theme") || "neon";
document.documentElement.setAttribute("data-theme", savedTheme);
</script>

<div class="app-wrap">

  <!-- =========================
       HERO
  ========================= -->
  <div class="hero">
    <div class="hero-inner">
      <div class="hero-title">Einstellungen</div>
      <div class="hero-sub">System & Gameplay</div>
    </div>
  </div>

  <div class="content">

    <!-- =========================
         TOGGLES
    ========================= -->
    <div class="card">

      <div class="setting">
        <div class="setting-label">Soundeffekte</div>
        <label class="switch">
          <input type="checkbox" id="soundToggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting">
        <div class="setting-label">Vibration</div>
        <label class="switch">
          <input type="checkbox" id="vibrationToggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting">
        <div class="setting-label">Auto-Save</div>
        <label class="switch">
          <input type="checkbox" id="autosaveToggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting">
        <div class="setting-label">Pause überspringbar</div>
        <label class="switch">
          <input type="checkbox" id="pauseSkipToggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting">
        <div class="setting-label">Combo Anzeige</div>
        <label class="switch">
          <input type="checkbox" id="comboToggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting">
        <div class="setting-label">Große Muskel-Icons</div>
        <label class="switch">
          <input type="checkbox" id="bigIconsToggle">
          <span class="slider"></span>
        </label>
      </div>

    </div>

    <!-- =========================
         THEME SELECTION
    ========================= -->
    <div class="card" style="margin-top:16px;">
      <div class="setting">
        <div class="setting-label">Theme</div>
      </div>

      <select id="themeSelect" class="action-btn">
        <option value="neon">Neon Green</option>
        <option value="crimson">Crimson Rage</option>
        <option value="ocean">Ocean Blue</option>
        <option value="gold">Golden Titan</option>
        <option value="void">Void Purple</option>
      </select>
    </div>

    <!-- =========================
         RESET
    ========================= -->
    <div class="card" style="margin-top:16px;">

      <button class="action-btn" onclick="resetHistory()">
        Nur Trainingshistorie löschen
      </button>

      <button class="action-btn danger" onclick="resetAll()">
        Alles zurücksetzen
      </button>

    </div>

  </div>

</div>

<script>
/* =========================
   SETTINGS LOGIC
========================= */

function getSetting(key, def="on"){
  return localStorage.getItem(key) ?? def;
}

const soundToggle = document.getElementById("soundToggle");
const vibrationToggle = document.getElementById("vibrationToggle");
const autosaveToggle = document.getElementById("autosaveToggle");
const pauseSkipToggle = document.getElementById("pauseSkipToggle");
const comboToggle = document.getElementById("comboToggle");
const bigIconsToggle = document.getElementById("bigIconsToggle");
const themeSelect = document.getElementById("themeSelect");

/* Load saved settings */
soundToggle.checked = getSetting("sound") === "on";
vibrationToggle.checked = getSetting("vibration") === "on";
autosaveToggle.checked = getSetting("autosave") === "on";
pauseSkipToggle.checked = getSetting("pauseSkip") === "on";
comboToggle.checked = getSetting("comboVisible") === "on";
bigIconsToggle.checked = getSetting("bigIcons") === "on";

themeSelect.value = savedTheme;

/* Save on change */
soundToggle.onchange = () =>
  localStorage.setItem("sound", soundToggle.checked ? "on" : "off");

vibrationToggle.onchange = () =>
  localStorage.setItem("vibration", vibrationToggle.checked ? "on" : "off");

autosaveToggle.onchange = () =>
  localStorage.setItem("autosave", autosaveToggle.checked ? "on" : "off");

pauseSkipToggle.onchange = () =>
  localStorage.setItem("pauseSkip", pauseSkipToggle.checked ? "on" : "off");

comboToggle.onchange = () =>
  localStorage.setItem("comboVisible", comboToggle.checked ? "on" : "off");

bigIconsToggle.onchange = () =>
  localStorage.setItem("bigIcons", bigIconsToggle.checked ? "on" : "off");

themeSelect.onchange = () => {
  const theme = themeSelect.value;
  localStorage.setItem("theme", theme);
  document.documentElement.setAttribute("data-theme", theme);
};

/* =========================
   RESET FUNCTIONS
========================= */

function resetHistory(){
  if(!confirm("Nur Trainingshistorie löschen? XP bleibt erhalten.")) return;
  localStorage.removeItem("history");
  localStorage.removeItem("lastDay");
  alert("Trainingshistorie gelöscht.");
}

function resetAll(){
  if(!confirm("Willst du wirklich ALLES zurücksetzen?")) return;

  localStorage.clear();
  localStorage.setItem("selectedWeek", 1);
  localStorage.setItem("selectedDay", "Push");
  localStorage.setItem("theme","neon");

  alert("Alles zurückgesetzt.");
  location.reload();
}
</script>

<!-- =========================
     LAYOUT (HEADER + TABS + FOOTER)
========================= -->
<script type="module">
import { loadLayout } from "../components/layout.js";

// activeRoute = "settings", backLink optional
loadLayout("settings","../index.html");
</script>

</body>
</html>
